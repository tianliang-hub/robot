<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧餐厅多机器人协同调度控制台</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <h1>智慧餐厅多机器人协同调度控制台</h1>
      </header>

      <main class="layout-main">
        <!-- 左侧：顾客模拟终端 -->
        <aside class="panel side-panel left-panel">
          <h2 class="panel-title">顾客模拟终端</h2>

          <section class="card table-card">
            <h3>桌台1</h3>
            <p class="table-state-row">
              当前状态：<span id="table-state-1" class="table-state">空闲</span>
            </p>
            <div class="btn-group">
              <button class="task-btn" data-action="order" data-table="1">
                普通点餐
              </button>
              <button class="task-btn emergency" data-action="water" data-table="1">
                紧急送水
              </button>
              <button class="task-btn checkout" data-action="checkout" data-table="1">
                点结账
              </button>
              <button class="task-btn cleanup" data-action="cleanup" data-table="1">
                收餐清理
              </button>
            </div>
          </section>

          <section class="card table-card">
            <h3>桌台2</h3>
            <p class="table-state-row">
              当前状态：<span id="table-state-2" class="table-state">空闲</span>
            </p>
            <div class="btn-group">
              <button class="task-btn" data-action="order" data-table="2">
                普通点餐
              </button>
              <button class="task-btn emergency" data-action="water" data-table="2">
                紧急送水
              </button>
              <button class="task-btn checkout" data-action="checkout" data-table="2">
                点结账
              </button>
              <button class="task-btn cleanup" data-action="cleanup" data-table="2">
                收餐清理
              </button>
            </div>
          </section>

          <section class="card ai-card">
            <h3>AI 指令台</h3>
            <p class="hint-text">示例：给2号桌先送水再结账</p>
            <div class="cmd-row">
              <input id="cmd-input" type="text" placeholder="输入自然语言指令..." />
              <button id="cmd-send" class="task-btn">解析执行</button>
            </div>
            <div class="cmd-row">
              <button id="voice-btn" class="task-btn">语音输入</button>
            </div>
          </section>
        </aside>

        <!-- 中间：Three.js 场景挂载区 -->
        <section class="center-stage panel">
          <h2 class="overlay-title">3D 场景监控区</h2>
          <div id="loading-indicator">模型加载中 0%</div>
          <div id="customer-panel" class="customer-panel hidden">
            <h3 id="customer-panel-title">顾客服务面板</h3>
            <p>桌台：<span id="customer-panel-table">-</span></p>
            <p>情绪：<span id="customer-panel-mood">-</span></p>
            <p>耐心：<span id="customer-panel-patience">-</span></p>
            <div class="patience-bar">
              <div id="customer-panel-patience-fill" class="patience-fill"></div>
            </div>
            <div class="cmd-row">
              <button id="customer-order-btn" class="task-btn">点单</button>
              <button id="customer-pickup-btn" class="task-btn">请求冰箱取货</button>
            </div>
            <div class="cmd-row">
              <button id="customer-checkout-btn" class="task-btn checkout">结账</button>
              <button id="customer-soothe-btn" class="task-btn emergency">安抚请求</button>
            </div>
            <button id="customer-panel-close" class="task-btn cleanup">关闭</button>
          </div>
          <div id="three-container"></div>
        </section>

        <!-- 右侧：调度中心 -->
        <aside class="panel side-panel right-panel">
          <h2 class="panel-title">调度中心</h2>

          <section class="card status-card">
            <p>厨师状态：<span id="chef-status" class="status idle">空闲</span></p>
            <p>服务员状态：<span id="waiter-status" class="status idle">空闲</span></p>
          </section>

          <section class="card queue-card">
            <h3>任务队列</h3>
            <ul id="task-list"></ul>
          </section>

          <section class="card control-card">
            <h3>演示模式</h3>
            <div class="cmd-row">
              <select id="scenario-select">
                <option value="normal">平峰模式</option>
                <option value="lunchRush">午高峰</option>
                <option value="emergency">突发事件</option>
              </select>
              <button id="replay-btn" class="task-btn">回放事件流</button>
            </div>
            <div class="cmd-row">
              <button id="demo-script-btn" class="task-btn">一键演示脚本</button>
            </div>
          </section>

          <section class="card metrics-card">
            <h3>仿真指标</h3>
            <ul id="metrics-list">
              <li>平均响应时延：<span id="metric-avg-response">0.0s</span></li>
              <li>任务完成率：<span id="metric-completion-rate">0%</span></li>
              <li>峰值队列长度：<span id="metric-peak-queue">0</span></li>
              <li>平均等待时长：<span id="metric-avg-wait">0.0s</span></li>
            </ul>
          </section>
        </aside>
      </main>

      <!-- 底部：系统日志 -->
      <footer class="panel log-panel">
        <h2 class="panel-title">系统日志</h2>
        <div class="log-box">
          <ul id="log-list"></ul>
        </div>
      </footer>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
